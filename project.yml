name: Knobler
options:
  deploymentTarget:
    macOS: "14.2"
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: 0.12.4
targets:
  Knobler:
    type: application
    platform: macOS
    sources:
      - Knobler
      # script que o MediaRemoteSource roda via /usr/bin/perl (now playing universal)
      - path: Vendor/mediaremote-adapter.pl
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - sdk: Collaboration.framework
      # carregado pelo perl, não pelo app — embed sem link (ver Vendor/PROVENANCE.md)
      - framework: Vendor/MediaRemoteAdapter.framework
        embed: true
        link: false
        codeSign: true
    scheme: {}
    info:
      path: Knobler/Info.plist
      properties:
        CFBundleName: Knobler
        CFBundleDisplayName: Knobler
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSAudioCaptureUsageDescription: Knobler lê o áudio do player para animar o visualizador no notch, como no iPhone.
        NSCalendarsFullAccessUsageDescription: Knobler mostra a contagem regressiva do próximo evento no notch.
        NSCameraUsageDescription: Knobler mostra sua câmera no notch como espelho antes de reuniões.
        NSMicrophoneUsageDescription: Knobler grava sua voz enquanto você segura a tecla de ditado, para transcrever onde o cursor estiver.
        NSBluetoothAlwaysUsageDescription: Knobler mostra o nível de bateria dos seus AirPods no notch quando eles conectam.
        NSLocalNetworkUsageDescription: Knobler troca mensagens com outros Macs na sua rede local.
        NSBonjourServices:
          - _knobler._tcp
        CFBundleIconFile: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoi.knobler
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: Knobler/Knobler-Bridging-Header.h
        # Espelha a última release. NÃO editar à mão — o tools/release.sh é o
        # único escritor (ver VERSIONING.md). Build de release sobrescreve via
        # override na linha de comando do xcodebuild.
        MARKETING_VERSION: "0.8.2"
        CURRENT_PROJECT_VERSION: "0.8.2"
        CODE_SIGN_IDENTITY: "Apple Development: luccaspessoal11@gmail.com (J8UFPJ9AZJ)"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 7UNDW72N73
        ENABLE_HARDENED_RUNTIME: "NO"
