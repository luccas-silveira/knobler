name: Knobler
options:
  deploymentTarget:
    macOS: "14.2"
targets:
  Knobler:
    type: application
    platform: macOS
    sources:
      - Knobler
    scheme: {}
    info:
      path: Knobler/Info.plist
      properties:
        CFBundleName: Knobler
        CFBundleDisplayName: Knobler
        LSUIElement: true
        NSAppleEventsUsageDescription: Knobler exibe e controla a reprodução do Spotify no notch.
        NSAudioCaptureUsageDescription: Knobler lê o áudio do Spotify para animar o visualizador no notch, como no iPhone.
        NSCalendarsFullAccessUsageDescription: Knobler mostra a contagem regressiva do próximo evento no notch.
        NSCameraUsageDescription: Knobler mostra sua câmera no notch como espelho antes de reuniões.
        CFBundleIconFile: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoi.knobler
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "Apple Development: luccaspessoal11@gmail.com (J8UFPJ9AZJ)"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 7UNDW72N73
        ENABLE_HARDENED_RUNTIME: "NO"
